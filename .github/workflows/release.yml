# MyWubi 发布流水线（Velopack）
#
# 触发方式：推送版本标签（v*.*.* 或 V*.*.*，大小写不敏感）
# 工作内容：校验变更日志 → 编译发布版 → vpk pack 生成安装包/便携包/增量包 → 创建 GitHub Release

name: 🚀 Release

on:
  push:
    tags:
      - "v*.*.*"
      - "V*.*.*"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: windows-latest

    steps:
      # ── 检出代码 ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 安装 Rust 工具链 ──────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      # ── 安装 .NET SDK 与 Velopack CLI ────────────────────────
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Velopack CLI (vpk)
        shell: pwsh
        run: dotnet tool update -g vpk

      # ── 解析版本号 ────────────────────────────────────────────
      - name: Parse version from tag
        id: version
        shell: pwsh
        run: |
          # 从 GITHUB_REF 提取版本号，统一转为小写
          $rawTag = "$env:GITHUB_REF" -replace '^refs/tags/', ''
          $version = $rawTag.TrimStart('v', 'V')
          Write-Host "Raw tag: $rawTag"
          Write-Host "Parsed version: $version"

          # 校验版本号格式（必须为 x.y.z）
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Invalid version format: '$version'. Expected semver (x.y.z)."
            exit 1
          }

          # 输出供后续步骤使用
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$rawTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── 解析变更日志 ──────────────────────────────────────────
      - name: Parse CHANGELOG for release notes
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $changelogPath = "CHANGELOG.md"

          if (-not (Test-Path $changelogPath)) {
            Write-Error "CHANGELOG.md not found!"
            exit 1
          }

          $content = Get-Content $changelogPath -Raw
          $lines = $content -split "`n"

          # 查找匹配的版本标题（大小写不敏感）
          $targetHeader = "## V$version"
          $startIndex = -1

          for ($i = 0; $i -lt $lines.Length; $i++) {
            if ($lines[$i].TrimStart() -match "^##\s+[Vv]$version\s*$") {
              $startIndex = $i
              break
            }
          }

          if ($startIndex -eq -1) {
            Write-Error "Version 'V$version' not found in CHANGELOG.md! " +
                        "Make sure a '## V$version' heading exists in the changelog."
            exit 1
          }

          # 从标题下一行开始收集，直到遇到下一个二级标题（##）或文件末尾
          $notes = [System.Collections.ArrayList]@()
          $started = $false
          for ($j = $startIndex + 1; $j -lt $lines.Length; $j++) {
            $line = $lines[$j]
            # 遇到下一个二级标题则停止
            if ($line.TrimStart() -match "^##\s+" -and $j -gt $startIndex) {
              break
            }
            # 跳过标题行自身
            if (-not $started -and $line.Trim() -eq "") {
              continue
            }
            $started = $true
            $null = $notes.Add($line)
          }

          if ($notes.Count -eq 0) {
            Write-Error "No release notes found under '## V$version' in CHANGELOG.md!"
            exit 1
          }

          $releaseBody = ($notes -join "`n").Trim()

          Write-Host "=== Release Notes ==="
          Write-Host $releaseBody
          Write-Host "====================="

          # 写入文件供后续步骤使用（避免 GITHUB_OUTPUT 的换行截断问题）
          $notesFile = "$env:RUNNER_TEMP\release_notes.md"
          $releaseBody | Out-File -FilePath $notesFile -Encoding utf8
          Write-Host "Release notes saved to: $notesFile"

          "notes_file=$notesFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── 编译发布版 ────────────────────────────────────────────
      - name: Build release binaries
        shell: pwsh
        run: |
          Write-Host "Building MyWubi release binaries..." -ForegroundColor Cyan
          cargo build --release
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Cargo build failed with exit code $LASTEXITCODE"
            exit 1
          }
          Write-Host "Build completed successfully." -ForegroundColor Green

      # ── Velopack 打包（Setup.exe / Portable.zip / 增量包）─────
      - name: Package with Velopack
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Write-Host "Running Velopack packaging for v$version..." -ForegroundColor Cyan
          .\build.ps1 -Version $version -SkipBuild
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Velopack packaging failed"
            exit 1
          }
          Write-Host "Packaging completed." -ForegroundColor Green

      # ── 创建 GitHub Release（上传全部 Velopack 资产）─────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: MyWubi ${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          files: |
            Releases/*-Setup.exe
            Releases/*-Portable.zip
            Releases/*.nupkg
            Releases/releases.*.json
